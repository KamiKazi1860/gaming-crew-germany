<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCG | Gaming Crew Germany - Est. 2012</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">

<style>
    :root { 
        --bf-orange: #ff4500; 
        --bf-blue: #0081a7; 
        --dark-bg: rgba(10, 10, 10, 0.9);
    }

    body { 
        /* HIER IST DER DUNKLE FILTER ZURÜCK: linear-gradient mit 85% Schwarz */
        background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), 
                    url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed; 
        background-size: cover; 
        color: #eee; 
        font-family: 'Oswald', sans-serif; 
        text-align: center; 
        margin: 0; 
        text-transform: uppercase; 
        overflow-x: hidden;
    }

    /* NAVIGATION */
    nav { 
        background: rgba(0,0,0,0.95); 
        border-bottom: 3px solid var(--bf-orange); 
        padding: 15px; 
        display: flex; 
        justify-content: center; 
        gap: 20px; 
        position: sticky; top: 0; z-index: 100;
    }
    nav a { 
        color: #fff; 
        text-decoration: none; 
        font-weight: bold; 
        cursor: pointer; 
        font-size: 1.1rem;
    }
    nav a:hover { color: var(--bf-orange); text-shadow: 0 0 10px var(--bf-orange); }

    .container { 
        max-width: 900px; 
        margin: 0 auto; 
        padding: 40px 20px; 
    }

    .logo { 
        width: 100%; 
        max-width: 380px; 
        margin: 20px 0; 
        filter: drop-shadow(0 0 15px var(--bf-orange)); 
    }

    .est { 
        color: var(--bf-blue); 
        letter-spacing: 5px; 
        font-weight: bold; 
        font-size: 1.2rem;
    }

    h1 { 
        font-size: 4rem; 
        margin: 10px 0; 
        font-style: italic; 
        text-shadow: 4px 4px 0px #000; 
    }

    /* HAUPT-EINSATZ-KASTEN */
    .mission-box {
        background: var(--dark-bg);
        border: 2px solid #333;
        border-left: 5px solid var(--bf-orange);
        padding: 40px;
        margin-top: 40px;
        text-align: left;
        box-shadow: 10px 10px 30px rgba(0,0,0,0.6);
    }

    .mission-box h2 {
        color: var(--bf-orange);
        font-size: 2.2rem;
        margin-top: 0;
        border-bottom: 1px solid #333;
        padding-bottom: 10px;
    }

    .mission-box p {
        font-size: 1.1rem;
        line-height: 1.6;
        color: #ccc;
    }

    /* DIE NEUE ACTION-LEISTE MIT SYMBOLEN */
    .action-bar {
        margin-top: 30px;
        display: flex;
        align-items: center;
        justify-content: flex-start; /* Links ausrichten */
        gap: 25px;
        flex-wrap: wrap; 
    }

    /* DER GROSSE DISCORD BUTTON */
    .discord-btn { 
        display: inline-flex; 
        align-items: center;
        gap: 10px; 
        background: var(--bf-orange); 
        color: #fff; 
        padding: 18px 35px; 
        text-decoration: none; 
        font-weight: bold; 
        font-size: 1.3rem; 
        clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); 
        transition: 0.3s; 
    }
    .discord-btn:hover { 
        background: #ff5e1a; 
        transform: scale(1.05); 
        box-shadow: 0 0 20px rgba(255, 69, 0, 0.5);
    }

    /* DIE KLEINEN SOCIAL SYMBOLE */
    .icon-link {
        color: #888; 
        font-size: 2.2rem; 
        transition: 0.3s;
        text-decoration: none;
    }

    /* EFFEKTE BEIM DRÜBERFAHREN */
    .icon-link:hover { transform: translateY(-5px) scale(1.1); }
    .yt-icon:hover { color: #ff0000; filter: drop-shadow(0 0 10px #ff0000); }    
    .ig-icon:hover { color: #e1306c; filter: drop-shadow(0 0 10px #e1306c); }    
    .tw-icon:hover { color: #9146ff; filter: drop-shadow(0 0 10px #9146ff); }    

    /* ANDERE SEKTIONEN (NEWS, TEAM) */
    .section { 
        display: none; 
        background: var(--dark-bg); 
        padding: 30px; 
        border-left: 5px solid var(--bf-orange); 
        margin-top: 20px; 
        text-align: left; 
    }
    .active { display: block; animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    footer { 
        margin-top: 60px; 
        padding: 30px; 
        background: #000; 
        font-size: 0.9rem; 
        color: #666; 
    }
    footer a { color: var(--bf-orange); text-decoration: none; }
</style>
</head>
<body>

<nav>
    <a onclick="sh('h')">HOME</a>
    <a onclick="sh('n')">NEWS</a>
    <a onclick="sh('t')">TEAM</a>
    <a href="https://xoose.de/gcg-shop/" target="_blank">SHOP</a>
</nav>

<div class="container">
    <img src="logo.png" class="logo" alt="GCG LOGO">
    
    <div class="est">ESTABLISHED 2012</div>
    <h1>GAMING CREW GERMANY</h1>

    <div id="h" class="section active mission-box">
