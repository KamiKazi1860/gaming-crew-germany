<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCG | Gaming Crew Germany</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<style>
:root { --bf-orange: #ff4500; --bf-blue: #0081a7; }
body { background: #000 url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed; background-size: cover; color: #eee; font-family: 'Oswald', sans-serif; margin: 0; text-transform: uppercase; text-align: center; }
nav { background: rgba(0,0,0,0.95); border-bottom: 3px solid var(--bf-orange); padding: 15px; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: center; gap: 20px; }
nav a { color: #fff; text-decoration: none; font-weight: bold; cursor: pointer; }
.container { max-width: 900px; margin: 0 auto; padding: 20px; }
.logo { width: 100%; max-width: 350px; margin: 20px 0; filter: drop-shadow(0 0 15px var(--bf-orange)); }
.section { display: none; background: rgba(20,20,20,0.95); padding: 30px; border-left: 5px solid var(--bf-orange); margin-top: 20px; text-align: left; }
.active { display: block; }
.social-bar { margin-top: 40px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; padding: 20px; background: rgba(255,255,255,0.1); border: 1px solid var(--bf-blue); }
.soc-btn { background: var(--bf-blue); color: #fff; padding: 10px 15px; text-decoration: none; font-weight: bold; font-size: 0.8rem; border: 1px solid #fff; }
.soc-btn:hover { background: var(--bf-orange); }
footer { margin-top: 60px; padding: 30px; background: #000; font-size: 0.8rem; color: #666; }
</style>
</head>
<body>
<nav>
<a onclick="show('h')">HOME</a>
<a onclick="show('n')">NEWS</a>
<a onclick="show('t')">TEAM</a>
<a href="https://xoose.de/gcg-shop/" target="_blank">SHOP</a>
</nav>
<div class="container">
<img src="logo.png" class="logo">
<div style="color:var(--bf-blue); letter-spacing:5px; font-weight:bold;">EST. 2012</div>
<h1 style="font-size:3.5rem; font-style:italic;">GAMING CREW GERMANY</h1>
<div id="h" class="section active">
<h2>Einsatzbefehl</h2>
<p>Battlefield Veteranen seit 2012.</p>
<center><a href="https://discord.gg/Zf2x54Va9F" target="_blank" style="display:inline-block; background:var(--bf-orange); color:#fff; padding:15px 30px; text-decoration:none; font-weight:bold;">DISCORD BEITRETEN</a></center>
</div>
<div id="n" class="section"><h2>Intel</h2><p>Website Online.</p></div>
<div id="t" class="section"><h2>Kommando</h2><p>Gründer: Kamikazi</p></div>
<div class="social-bar">
<a href="https://www.instagram.com/gcg_gaming_crew_germany" target="_blank" class="soc-btn">INSTAGRAM</a>
<a href="https://x.com/gcg_gaming_crew" target="_blank" class="soc-btn">X / TWITTER</a>
<a href="https://www.youtube.com/user/gcggamingcrewgermany" target="_blank" class="soc-btn">YOUTUBE</a>
<a href="https://www.twitch.tv/gcg_gaming_crew_german" target="_blank" class="soc-btn">TWITCH</a>
</div>
</div>
<footer>&copy; 2026 GCG | <a href="https://gamertransfer.com" target="_blank" style="color:var(--bf-orange)">Gamertransfer.com</a></footer>
<script>
function show(id) {
document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}
</script>
</body>
</html>
